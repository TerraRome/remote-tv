name: remote
description: "Smart TV Remote application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Discovery
  multicast_dns: ^0.3.2

  # Utilities
  logger: ^2.5.0
  collection: ^1.19.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  injectable_generator: ^2.6.2
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
